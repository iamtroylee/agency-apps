<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Client Board">
<meta name="theme-color" content="#111827">
<link rel="manifest" href="manifest-board.json">
<title>Client Board</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--sur:#fff;--sur2:#f8f9fb;--bdr:#e4e7ec;--bdr2:#d0d5dd;
  --tx:#101828;--tx2:#344054;--tx3:#667085;--tx4:#98a2b3;
  --bl:#2563eb;--bl-bg:#eff6ff;
  --gr:#059669;--gr-bg:#ecfdf5;
  --am:#d97706;--am-bg:#fffbeb;
  --rd:#dc2626;--rd-bg:#fef2f2;
  --pu:#7c3aed;--pu-bg:#f5f3ff;
  --cy:#0891b2;--cy-bg:#ecfeff;
  --pk:#db2777;--pk-bg:#fdf2f8;
  --r:12px;--rsm:8px;--rxs:6px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:50px}

/* TOP BAR */
.topbar{background:#111827;padding:calc(env(safe-area-inset-top,0px)+14px) 16px 12px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.tb-left{flex:1}
.topbar-title{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.2px}
.topbar-sub{font-size:11px;color:#6b7280;margin-top:1px;display:flex;align-items:center;gap:8px}
#sync-status{font-size:10px;font-weight:700;letter-spacing:.03em;padding:2px 7px;border-radius:10px}
.sy-gr{background:rgba(5,150,105,.25);color:#6ee7b7}
.sy-am{background:rgba(217,119,6,.25);color:#fcd34d}
.sy-bl{background:rgba(37,99,235,.25);color:#93c5fd}
.sy-rd{background:rgba(220,38,38,.25);color:#fca5a5}
.add-btn{background:var(--bl);color:#fff;border:none;border-radius:var(--rsm);padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}

/* VIEWS */
.view{display:none}.view.active{display:block}
.list-wrap{padding:14px}
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.list-title{font-size:19px;font-weight:800;letter-spacing:-.3px}
.client-count{font-size:12px;color:var(--tx3);background:var(--sur);border:1px solid var(--bdr);padding:3px 10px;border-radius:20px}

/* FILTER CHIPS */
.filter-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.chip{padding:6px 12px;font-size:12px;font-weight:600;border-radius:20px;background:var(--sur);border:1px solid var(--bdr);color:var(--tx3);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.chip.active{background:var(--bl);color:#fff;border-color:var(--bl)}

.search{width:100%;padding:10px 13px;border:1.5px solid var(--bdr);border-radius:var(--rsm);font-size:14px;font-family:inherit;color:var(--tx);background:var(--sur);outline:none;margin-bottom:12px}
.search:focus{border-color:var(--bl)}

/* CLIENT CARD */
.client-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:15px 16px;margin-bottom:10px;cursor:pointer;box-shadow:var(--sh);position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.client-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.tier1::before{background:#2563eb}.tier2::before{background:#7c3aed}.tier3::before{background:#059669}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.cc-name{font-size:16px;font-weight:700}
.cc-tier{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.t1{background:var(--bl-bg);color:var(--bl)}.t2{background:var(--pu-bg);color:var(--pu)}.t3{background:var(--gr-bg);color:var(--gr)}
.cc-meta{font-size:13px;color:var(--tx3);margin-bottom:8px}
.cc-bar{height:4px;background:var(--bdr);border-radius:2px;overflow:hidden;margin-bottom:4px}
.cc-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);transition:width .3s}
.cc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)}
.sp{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.sp-prospect{background:#f0f0f5;color:#5a5a6a}
.sp-negotiating{background:var(--bl-bg);color:var(--bl)}
.sp-building{background:var(--pu-bg);color:var(--pu)}
.sp-live{background:var(--gr-bg);color:var(--gr)}
.sp-monthly{background:var(--am-bg);color:var(--am)}
.sp-at-risk{background:var(--rd-bg);color:var(--rd)}
.sp-churned{background:#f0f0f5;color:var(--tx3)}
.cc-next{font-size:11px;color:var(--bl);font-weight:600;margin-top:4px}

/* EMPTY STATE */
.empty{text-align:center;padding:52px 24px}
.empty-icon{font-size:48px;margin-bottom:14px}
.empty-title{font-size:18px;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--tx3);line-height:1.65;margin-bottom:22px}
.empty-btn{background:var(--bl);color:#fff;border:none;border-radius:var(--rsm);padding:12px 24px;font-size:15px;font-weight:700;cursor:pointer}

/* MODAL / OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end}
.overlay.open{display:flex}
.modal{background:var(--sur);border-radius:20px 20px 0 0;padding:20px 16px 44px;width:100%;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--bdr2);border-radius:var(--rsm);font-size:14px;font-family:inherit;color:var(--tx);background:var(--sur);outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--bl)}
.field textarea{resize:vertical;min-height:80px}
.modal-btns{display:flex;gap:10px;margin-top:8px}
.btn-p{flex:1;padding:13px;background:var(--bl);color:#fff;border:none;border-radius:var(--rsm);font-size:15px;font-weight:700;cursor:pointer}
.btn-s{padding:13px 18px;background:var(--sur2);color:var(--tx2);border:1.5px solid var(--bdr2);border-radius:var(--rsm);font-size:14px;font-weight:600;cursor:pointer}
.btn-danger{padding:11px 16px;background:var(--rd-bg);color:var(--rd);border:1.5px solid var(--rd);border-radius:var(--rsm);font-size:13px;font-weight:600;cursor:pointer}

/* DETAIL VIEW */
.detail-wrap{padding-bottom:20px}
.hero{background:#111827;padding:16px 16px 20px;color:#fff}
.back{display:flex;align-items:center;gap:5px;color:#6b7280;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px;-webkit-tap-highlight-color:transparent;width:fit-content}
.hero-hdr-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.edit-profile-btn{background:rgba(255,255,255,.1);color:#e5e7eb;border:none;padding:5px 11px;border-radius:var(--rsm);font-size:12px;font-weight:600;cursor:pointer}
.d-name{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px}
.d-meta{font-size:13px;color:#9ca3af;margin-bottom:12px}
.d-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.db{font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px}
.db-tier{background:rgba(37,99,235,.3);color:#93c5fd}
.db-s-prospect{background:rgba(255,255,255,.1);color:#d1d5db}
.db-s-negotiating{background:rgba(37,99,235,.25);color:#93c5fd}
.db-s-building{background:rgba(124,58,237,.25);color:#c4b5fd}
.db-s-live{background:rgba(5,150,105,.25);color:#6ee7b7}
.db-s-monthly{background:rgba(217,119,6,.25);color:#fcd34d}
.db-s-at-risk{background:rgba(220,38,38,.3);color:#fca5a5}
.db-s-churned{background:rgba(255,255,255,.08);color:#9ca3af}
.prog-hero{background:rgba(255,255,255,.08);border-radius:var(--rsm);padding:12px 14px}
.ph-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ph-label{font-size:13px;font-weight:600;color:#e5e7eb}
.ph-pct{font-size:15px;font-weight:800;color:#fff}
.ph-bar{height:6px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden}
.ph-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);transition:width .4s}

/* TABS */
.tabs{display:flex;background:var(--sur);border-bottom:1px solid var(--bdr);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 14px;font-size:13px;font-weight:600;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.tab.active{color:var(--bl);border-bottom-color:var(--bl)}
.tab-body{display:none;padding:14px}.tab-body.active{display:block}

/* PHASE ACCORDION */
.phase{margin-bottom:10px}
.phase-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 15px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);cursor:pointer;box-shadow:var(--sh);-webkit-tap-highlight-color:transparent;position:relative}
.phase-hdr::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--r) 0 0 var(--r)}
.ph-p1::before{background:#7c3aed}.ph-p2::before{background:#d97706}.ph-p3::before{background:#059669}.ph-p4::before{background:#dc2626}.ph-p5::before{background:#0891b2}.ph-p6::before{background:#db2777}
.phase-hdr.open{border-radius:var(--r) var(--r) 0 0;border-bottom-color:transparent;box-shadow:none}
.phase-left{flex:1}
.phase-title-text{font-size:15px;font-weight:700;color:var(--tx)}
.phase-sub-text{font-size:12px;color:var(--tx3);margin-top:2px}
.phase-right{display:flex;align-items:center;gap:6px}
.phase-stat{font-size:12px;font-weight:700;color:var(--tx3)}
.phase-chevron{font-size:10px;color:var(--tx4);transition:transform .2s}
.phase-chevron.open{transform:rotate(180deg)}
.phase-body{display:none;background:var(--sur);border:1px solid var(--bdr);border-top:none;border-radius:0 0 var(--r) var(--r)}
.phase-body.open{display:block}

/* TASKS */
.task{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-bottom:1px solid var(--bg)}
.task:last-child{border-bottom:none}
.cb{width:22px;height:22px;border:2px solid var(--bdr2);border-radius:6px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.cb.done{background:var(--gr);border-color:var(--gr)}
.cb.done::after{content:'✓';font-size:12px;color:#fff;font-weight:800}
.task-r{flex:1}
.task-title{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:2px}
.task-title.done{color:var(--tx3);text-decoration:line-through}
.task-hint{font-size:12px;color:var(--tx3);line-height:1.5}

/* MESSAGE TEMPLATES */
.msg-template{margin:0 12px 12px;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rsm)}
.msg-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--bdr);cursor:pointer;-webkit-tap-highlight-color:transparent}
.msg-label{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.msg-label-text{background:var(--bl-bg);color:var(--bl)}
.msg-label-sms{background:var(--gr-bg);color:var(--gr)}
.msg-label-email{background:var(--am-bg);color:var(--am)}
.msg-title{font-size:12px;font-weight:600;color:var(--tx2);flex:1;margin:0 8px}
.msg-copy{font-size:11px;font-weight:600;color:var(--bl);cursor:pointer;padding:4px 8px;background:var(--bl-bg);border-radius:var(--rxs);border:none;-webkit-tap-highlight-color:transparent}
.msg-body{padding:10px 12px;font-size:13px;line-height:1.7;color:var(--tx2);white-space:pre-wrap;display:none}
.msg-body.open{display:block}

/* INFO TAB */
.info-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:11px;box-shadow:var(--sh)}
.info-section-title{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--bg);gap:12px}
.info-row:last-child{border-bottom:none}
.info-key{font-size:13px;color:var(--tx3);flex-shrink:0}
.info-val{font-size:13px;font-weight:600;color:var(--tx);text-align:right;word-break:break-word;max-width:65%}

/* NOTES TAB */
.notes-area{width:100%;padding:12px;border:1.5px solid var(--bdr2);border-radius:var(--rsm);font-size:14px;font-family:inherit;color:var(--tx);background:var(--sur);outline:none;resize:vertical;min-height:140px;line-height:1.6}
.notes-area:focus{border-color:var(--bl)}
.notes-hint{font-size:12px;color:var(--tx4);margin-top:6px}

/* TIMELINE TAB */
.timeline-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.timeline-item:last-child{border-bottom:none}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--bl);flex-shrink:0;margin-top:4px}
.tl-body{flex:1}
.tl-title{font-size:13px;font-weight:600;color:var(--tx)}
.tl-date{font-size:11px;color:var(--tx4);margin-top:2px}
.add-event-btn{width:100%;padding:11px;background:var(--sur2);border:1.5px dashed var(--bdr2);border-radius:var(--rsm);font-size:13px;font-weight:600;color:var(--tx3);cursor:pointer;margin-top:10px;-webkit-tap-highlight-color:transparent}

/* LAUNCH COUNTDOWN */
.countdown-bar{background:linear-gradient(135deg,#1e3a5f,#1e1347);border-radius:var(--rsm);padding:14px 16px;margin:14px 14px 0;display:flex;align-items:center;justify-content:space-between;gap:12px}
.cd-label{font-size:12px;font-weight:600;color:#93c5fd;margin-bottom:3px}
.cd-days{font-size:28px;font-weight:800;color:#fff;letter-spacing:-.5px;line-height:1}
.cd-sub{font-size:11px;color:#6b7280;margin-top:2px}
.cd-set{font-size:11px;font-weight:600;color:#6b7280;cursor:pointer;text-decoration:underline;padding:4px 0;-webkit-tap-highlight-color:transparent}
.cd-overdue{color:#fca5a5}
.cd-done{color:#6ee7b7}
.cd-right{text-align:right;flex-shrink:0}

/* REVENUE TAB */
.rev-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.rev-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bg);font-size:13px}
.rev-row:last-child{border-bottom:none}
.rev-val{font-weight:700;color:var(--gr)}
.rev-label{color:var(--tx3)}

@media(prefers-color-scheme:dark){
  :root{--bg:#0a0a0a;--sur:#1c1c1e;--sur2:#2c2c2e;--bdr:#2c2c2e;--bdr2:#3a3a3c;--tx:#f5f5f7;--tx2:#e5e5ea;--tx3:#98989d;--tx4:#636366;--bl-bg:#162247;--gr-bg:#0d2d1f;--am-bg:#2d1f00;--rd-bg:#2d0f0f;--pu-bg:#1e1347;--cy-bg:#0a1f26;--pk-bg:#2d0f1f}
  .search,.field input,.field select,.field textarea,.notes-area{background:var(--sur2);color:var(--tx);border-color:var(--bdr2)}
  .modal,.info-card,.filter-chip,.rev-card{background:var(--sur)}
  .topbar,.hero{background:#0d0d0d}
  .phase-hdr,.phase-body,.client-card,.msg-template{background:var(--sur)}
  .t1{background:#162247;color:#6fa3f8}.t2{background:#1e1347;color:#a78bfa}.t3{background:#0d2d1f;color:#34d399}
  .sp-prospect{background:#2c2c2e;color:#9ca3af}
  .sp-negotiating{background:#162247;color:#6fa3f8}
  .sp-building{background:#1e1347;color:#a78bfa}
  .sp-live{background:#0d2d1f;color:#34d399}
  .sp-monthly{background:#2d1f00;color:#fbbf24}
  .sp-at-risk{background:#2d0f0f;color:#f87171}
  .sp-churned{background:#2c2c2e;color:#6b7280}
  .task,.info-row,.rev-row,.timeline-item{border-color:var(--bg)}
  .btn-s{background:var(--sur2);color:var(--tx2);border-color:var(--bdr2)}
  .tabs{background:var(--sur);border-color:var(--bdr)}
  .msg-body{background:var(--sur2)}
  .add-event-btn{background:var(--sur2);border-color:var(--bdr2)}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <div class="topbar-title">Client Board</div>
    <div class="topbar-sub">
      <span id="ts">0 clients</span>
      <span id="sync-status" class="sy-bl">↓ Loading</span>
    </div>
  </div>
  <button class="add-btn" onclick="openNew()">+ Add Client</button>
</div>

<!-- LIST VIEW -->
<div id="vlist" class="view active">
  <div class="list-wrap">
    <div class="list-header">
      <div class="list-title">All clients</div>
      <div class="client-count" id="ccount">0</div>
    </div>

    <div class="filter-row">
      <button class="chip active" id="fchip-all" onclick="setFilter('tier','all')">All Tiers</button>
      <button class="chip" id="fchip-tier1" onclick="setFilter('tier','tier1')">Tier 1</button>
      <button class="chip" id="fchip-tier2" onclick="setFilter('tier','tier2')">Tier 2</button>
      <button class="chip" id="fchip-tier3" onclick="setFilter('tier','tier3')">Tier 3</button>
    </div>
    <div class="filter-row">
      <button class="chip active" id="schip-all" onclick="setFilter('status','all')">All Status</button>
      <button class="chip" id="schip-prospect" onclick="setFilter('status','prospect')">Prospect</button>
      <button class="chip" id="schip-negotiating" onclick="setFilter('status','negotiating')">Negotiating</button>
      <button class="chip" id="schip-building" onclick="setFilter('status','building')">Building</button>
      <button class="chip" id="schip-live" onclick="setFilter('status','live')">Live</button>
      <button class="chip" id="schip-monthly" onclick="setFilter('status','monthly')">Monthly</button>
      <button class="chip" id="schip-at-risk" onclick="setFilter('status','at-risk')">At Risk</button>
    </div>

    <input class="search" type="text" placeholder="Search by name, type, owner…" oninput="setSearchQuery(this.value)">
    <div id="clist"></div>
  </div>
</div>

<!-- DETAIL VIEW -->
<div id="vdetail" class="view">
  <div class="detail-wrap">
    <div class="hero">
      <div class="back" onclick="goBack()">← All clients</div>
      <div class="hero-hdr-row">
        <div>
          <div class="d-name" id="dn">—</div>
          <div class="d-meta" id="dm">—</div>
        </div>
        <button class="edit-profile-btn" onclick="openEditProfile()">Edit Info</button>
      </div>
      <div class="d-badges" id="db"></div>
      <div class="prog-hero">
        <div class="ph-top"><span class="ph-label">Journey progress</span><span class="ph-pct" id="dpct">0%</span></div>
        <div class="ph-bar"><div class="ph-fill" id="dpfill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="stab(this,'tc')">Checklist</div>
      <div class="tab" onclick="stab(this,'tn')">Notes</div>
      <div class="tab" onclick="stab(this,'ttl')">Timeline</div>
      <div class="tab" onclick="stab(this,'tr')">Revenue</div>
      <div class="tab" onclick="stab(this,'ti')">Info</div>
    </div>

    <div id="launch-countdown" style="display:none"></div>
    <div id="tc" class="tab-body active"><div id="phases"></div></div>
    <div id="tn" class="tab-body">
      <textarea class="notes-area" id="notes-field" placeholder="Anything about this client — what they care about, what's going wrong, their dog's name, literally whatever helps you..." oninput="autoSaveNotes()"></textarea>
      <div class="notes-hint">Auto-saves as you type</div>
    </div>
    <div id="ttl" class="tab-body"><div id="timeline-list"></div><button class="add-event-btn" onclick="openAddEvent()">+ Add event</button></div>
    <div id="tr" class="tab-body"><div id="rev-panel"></div></div>
    <div id="ti" class="tab-body"><div id="ilist"></div></div>
  </div>

// ── UTILS ──────────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function tierLabel(t){return{tier1:'Tier 1',tier2:'Tier 2',tier3:'Tier 3'}[t]||t}
function tierClass(t){return{tier1:'t1',tier2:'t2',tier3:'t3'}[t]||'t1'}
function statusLabel(s){return{prospect:'Prospect',negotiating:'Negotiating',building:'Building',live:'Live',monthly:'Monthly','at-risk':'At Risk',churned:'Churned'}[s]||s}
function spClass(s){return{prospect:'sp-prospect',negotiating:'sp-negotiating',building:'sp-building',live:'sp-live',monthly:'sp-monthly','at-risk':'sp-at-risk',churned:'sp-churned'}[s]||'sp-prospect'}
function dbSClass(s){return{prospect:'db-s-prospect',negotiating:'db-s-negotiating',building:'db-s-building',live:'db-s-live',monthly:'db-s-monthly','at-risk':'db-s-at-risk',churned:'db-s-churned'}[s]||'db-s-prospect'}
function fmtDate(d){if(!d)return'';try{const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch{return d}}

function progress(c){
  const total=PHASES.reduce((a,p)=>a+p.tasks.length,0);
  const done=Object.values(c.tasks||{}).filter(Boolean).length;
  return total?Math.round(done/total*100):0;
}
function phaseProg(c,pid){
  const p=PHASES.find(x=>x.id===pid);if(!p)return{done:0,total:0};
  const done=p.tasks.filter(t=>c.tasks&&c.tasks[t.id]).length;
  return{done,total:p.tasks.length};
}
function updateProg(c){
  const pct=progress(c);
  const pctEl=document.getElementById('dpct');
  const fillEl=document.getElementById('dpfill');
  if(pctEl)pctEl.textContent=pct+'%';
  if(fillEl)fillEl.style.width=pct+'%';
}

function renderCountdown(c){
  const el=document.getElementById('launch-countdown');
  if(!el)return;
  if(!c.launchDate){
    el.style.display='block';
    el.innerHTML=`<div class="countdown-bar"><div><div class="cd-label">Target launch</div><div class="cd-days" style="font-size:16px;color:#6b7280">No date set</div></div><div class="cd-right"><span class="cd-set" onclick="openEditProfile()">Set launch date</span></div></div>`;
    return;
  }
  const now=new Date();now.setHours(0,0,0,0);
  const launch=new Date(c.launchDate+'T00:00:00');launch.setHours(0,0,0,0);
  const diff=Math.round((launch-now)/(1000*60*60*24));
  const launched=c.status==='live'||c.status==='monthly';
  let daysHtml,subHtml,labelHtml;
  if(launched){
    labelHtml='Client is live';
    daysHtml=`<div class="cd-days cd-done">Live ✓</div>`;
    subHtml=`Launched ${fmtDate(c.launchDate)}`;
  } else if(diff<0){
    labelHtml='Launch target';
    daysHtml=`<div class="cd-days cd-overdue">${Math.abs(diff)}d overdue</div>`;
    subHtml=`Was ${fmtDate(c.launchDate)} — update the date`;
  } else if(diff===0){
    labelHtml='Launch target';
    daysHtml=`<div class="cd-days" style="color:#fcd34d">Today!</div>`;
    subHtml='Launch day — get it live';
  } else {
    labelHtml='Days to launch';
    daysHtml=`<div class="cd-days">${diff}</div>`;
    subHtml=fmtDate(c.launchDate);
  }
  el.style.display='block';
  el.innerHTML=`<div class="countdown-bar"><div><div class="cd-label">${labelHtml}</div>${daysHtml}<div class="cd-sub">${subHtml}</div></div><div class="cd-right"><span class="cd-set" onclick="openEditProfile()">Edit</span></div></div>`;
}

// ── SYNC STATUS ────────────────────────────────────────────────────
function setSyncStatus(s){
  const el=document.getElementById('sync-status');
  const map={synced:['✓ Synced','sy-gr'],saving:['↑ Saving','sy-am'],offline:['⚡ Local','sy-am'],loading:['↓ Loading','sy-bl']};
  if(el&&map[s]){el.className=map[s][1];el.textContent=map[s][0];}
}
function save(){
  lsSave();
  if(!fbReady){setSyncStatus('offline');return;}
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    DOC.set({clients},{merge:false})
      .then(()=>setSyncStatus('synced'))
      .catch(()=>setSyncStatus('offline'));
  },800);
}

// ── FILTER & SEARCH ────────────────────────────────────────────────
function setFilter(type,val){
  if(type==='tier') tierFilter=val;
  if(type==='status') statusFilter=val;
  document.querySelectorAll('.filter-row').forEach(row=>{
    row.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  });
  const tid=type==='tier'?'fchip-'+val:'schip-'+val;
  const el=document.getElementById(tid);
  if(el)el.classList.add('active');
  renderList();
}
function setSearchQuery(v){searchQ=v;renderList();}

function renderList(){
  const el=document.getElementById('clist');
  const cc=document.getElementById('ccount');
  const ts=document.getElementById('ts');
  if(!el)return;
  let vis=clients;
  if(tierFilter!=='all') vis=vis.filter(c=>c.tier===tierFilter);
  if(statusFilter!=='all') vis=vis.filter(c=>c.status===statusFilter);
  if(searchQ){const lq=searchQ.toLowerCase();vis=vis.filter(c=>c.name.toLowerCase().includes(lq)||(c.owner||'').toLowerCase().includes(lq)||(c.type||'').toLowerCase().includes(lq));}
  if(cc)cc.textContent=clients.length+' client'+(clients.length!==1?'s':'');
  if(ts)ts.textContent=clients.length+' client'+(clients.length!==1?'s':'')+' total';
  if(!clients.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🏄</div><div class="empty-title">No clients yet</div><div class="empty-sub">Add your first client to start tracking their journey.</div><button class="empty-btn" onclick="openNew()">Add your first client</button></div>`;
    return;
  }
  if(!vis.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No matches</div><div class="empty-sub">Try adjusting your filters or search.</div></div>`;return;}
  el.innerHTML=vis.map(c=>{
    const pct=progress(c);
    const nextTask=getNextTask(c);
    let cdChip='';
    if(c.launchDate&&c.status!=='live'&&c.status!=='monthly'&&c.status!=='churned'){
      const now=new Date();now.setHours(0,0,0,0);
      const launch=new Date(c.launchDate+'T00:00:00');launch.setHours(0,0,0,0);
      const diff=Math.round((launch-now)/(1000*60*60*24));
      if(diff<0) cdChip=`<span style="font-size:11px;font-weight:700;background:var(--rd-bg);color:var(--rd);padding:2px 8px;border-radius:10px">${Math.abs(diff)}d overdue</span>`;
      else if(diff===0) cdChip=`<span style="font-size:11px;font-weight:700;background:var(--am-bg);color:var(--am);padding:2px 8px;border-radius:10px">Launch today!</span>`;
      else cdChip=`<span style="font-size:11px;font-weight:600;color:var(--tx4)">${diff}d to launch</span>`;
    }
    return`<div class="client-card ${c.tier}" onclick="openClient('${c.id}')">
      <div class="cc-top"><div class="cc-name">${esc(c.name)}</div><span class="cc-tier ${tierClass(c.tier)}">${tierLabel(c.tier)}</span></div>
      <div class="cc-meta">${[c.owner,c.type,c.monthly?c.monthly+'/mo':''].filter(Boolean).join(' \xb7 ')}</div>
      <div class="cc-bar"><div class="cc-fill" style="width:${pct}%"></div></div>
      <div class="cc-footer"><span class="sp ${spClass(c.status||'prospect')}">${statusLabel(c.status||'prospect')}</span><div style="display:flex;align-items:center;gap:8px">${cdChip}<span style="font-size:12px;color:var(--tx4)">${pct}% \xb7 \u2192</span></div></div>
      ${nextTask?`<div class="cc-next">\u21b3 Next: ${esc(nextTask)}</div>`:''}
    </div>`;
  }).join('');
}

function getNextTask(c){
  for(const ph of PHASES){
    for(const task of ph.tasks){
      if(!c.tasks||!c.tasks[task.id])return task.t;
    }
  }
  return null;
}

// ── DETAIL VIEW ────────────────────────────────────────────────────
function openClient(id){
  cid=id;const c=clients.find(x=>x.id===id);if(!c)return;
  document.getElementById('dn').textContent=c.name;
  document.getElementById('dm').textContent=[c.owner,c.type,c.phone].filter(Boolean).join(' · ');
  updateHeroBadges(c);updateProg(c);
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  document.querySelectorAll('.tab-body').forEach((t,i)=>t.classList.toggle('active',i===0));
  renderPhases(c);renderInfo(c);renderTimeline(c);renderRevenue(c);loadNotes(c);renderCountdown(c);
  document.getElementById('vlist').classList.remove('active');
  document.getElementById('vdetail').classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
}

function updateHeroBadges(c){
  const s=c.status||'prospect';
  const dbEl=document.getElementById('db');
  if(dbEl){
    dbEl.innerHTML=`<span class="db db-tier">${tierLabel(c.tier)}</span><span class="db ${dbSClass(s)}">${statusLabel(s)}</span>${c.monthly?`<span class="db db-tier">${esc(c.monthly)}/mo</span>`:''}${c.startDate?`<span class="db" style="background:rgba(255,255,255,.08);color:#9ca3af">Started ${fmtDate(c.startDate)}</span>`:''}`;
  }
}

function goBack(){
  cid=null;
  document.getElementById('vdetail').classList.remove('active');
  document.getElementById('vlist').classList.add('active');
  renderList();window.scrollTo({top:0,behavior:'instant'});
}
function stab(btn,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-body').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');document.getElementById(id).classList.add('active');
}

// ── PHASES & TASKS ────────────────────────────────────────────────
function renderPhases(c){
  const el=document.getElementById('phases');
  if(!el)return;
  el.innerHTML=PHASES.map(ph=>{
    const pg=phaseProg(c,ph.id);
    const isCollapsed=collapsedPhases[ph.id]===true;
    const taskHtml=ph.tasks.map(task=>{
      const isDone=c.tasks&&c.tasks[task.id];
      return`<div class="task">
        <div class="cb ${isDone?'done':''}" onclick="event.stopPropagation();toggleTask('${c.id}','${task.id}')"></div>
        <div class="task-r">
          <div class="task-title ${isDone?'done':''}">${esc(task.t)}</div>
          <div class="task-hint">${esc(task.h)}</div>
        </div>
      </div>`;
    }).join('');
    const msgHtml=ph.messages?(ph.messages.map((msg,mi)=>{
      const midKey=ph.id+'-msg-'+mi;
      return`<div class="msg-template">
        <div class="msg-hdr" onclick="toggleMsg('${midKey}')">
          <span class="msg-label msg-label-${msg.type}">${msg.label}</span>
          <span class="msg-title">${esc(msg.title)}</span>
          <button class="msg-copy" onclick="event.stopPropagation();copyMsg('${midKey}')">Copy</button>
        </div>
        <div class="msg-body" id="${midKey}">${esc(msg.body)}</div>
      </div>`;
    }).join('')):'';
    return`<div class="phase">
      <div class="phase-hdr ${ph.cls} ${!isCollapsed?'open':''}" onclick="togglePhase('${ph.id}')">
        <div class="phase-left">
          <div class="phase-title-text">${esc(ph.label)}</div>
          <div class="phase-sub-text">${esc(ph.sub)}</div>
        </div>
        <div class="phase-right">
          <div class="phase-stat">${pg.done}/${pg.total}</div>
          <div class="phase-chevron ${!isCollapsed?'open':''}">▲</div>
        </div>
      </div>
      <div class="phase-body ${!isCollapsed?'open':''}">
        ${taskHtml}
        ${msgHtml?`<div style="padding-top:4px;padding-bottom:2px"><div style="font-size:11px;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:.05em;padding:8px 13px 6px">Message templates</div>${msgHtml}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function togglePhase(id){
  collapsedPhases[id]=!collapsedPhases[id];
  localStorage.setItem('cbCollapsed',JSON.stringify(collapsedPhases));
  const c=clients.find(x=>x.id===cid);
  if(c)renderPhases(c);
}
function toggleTask(clientId,taskId){
  const c=clients.find(x=>x.id===clientId);if(!c)return;
  if(!c.tasks)c.tasks={};
  c.tasks[taskId]=!c.tasks[taskId];
  renderPhases(c);updateProg(c);save();
}
function toggleMsg(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('open');
}
function copyMsg(id){
  const el=document.getElementById(id);
  if(!el)return;
  const text=el.innerText.trim();
  const done=()=>{};
  navigator.clipboard?navigator.clipboard.writeText(text).then(done).catch(()=>{}):(() => {const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);})();
}

// ── NOTES ─────────────────────────────────────────────────────────
function loadNotes(c){
  const el=document.getElementById('notes-field');
  if(el)el.value=c.notes||'';
}
function autoSaveNotes(){
  const c=clients.find(x=>x.id===cid);if(!c)return;
  c.notes=document.getElementById('notes-field').value;
  clearTimeout(notesTimer);
  notesTimer=setTimeout(()=>save(),1200);
}

// ── TIMELINE ──────────────────────────────────────────────────────
function renderTimeline(c){
  const el=document.getElementById('timeline-list');if(!el)return;
  const events=(c.timeline||[]).slice().reverse();
  if(!events.length){el.innerHTML='<div style="font-size:13px;color:var(--tx4);padding:4px 0 12px">No events yet. Add milestones as they happen.</div>';return;}
  el.innerHTML=events.map((ev,i)=>`
    <div class="timeline-item">
      <div class="tl-dot"></div>
      <div class="tl-body">
        <div class="tl-title">${esc(ev.title)}</div>
        <div class="tl-date">${fmtDate(ev.date)}</div>
      </div>
    </div>`).join('');
}
function openAddEvent(){document.getElementById('ev-title').value='';document.getElementById('ev-date').value=new Date().toISOString().split('T')[0];document.getElementById('event-overlay').classList.add('open');}
function closeEventModal(){document.getElementById('event-overlay').classList.remove('open');}
function saveEvent(){
  const title=document.getElementById('ev-title').value.trim();
  const date=document.getElementById('ev-date').value;
  if(!title)return;
  const c=clients.find(x=>x.id===cid);if(!c)return;
  if(!c.timeline)c.timeline=[];
  c.timeline.push({title,date,id:uid()});
  renderTimeline(c);closeEventModal();save();
}

// ── REVENUE PANEL ──────────────────────────────────────────────────
function renderRevenue(c){
  const el=document.getElementById('rev-panel');if(!el)return;
  const setup=parseFloat((c.setup||'').replace(/[^0-9.]/g,''))||0;
  const monthly=parseFloat((c.monthly||'').replace(/[^0-9.]/g,''))||0;
  const monthsActive=c.startDate?Math.max(0,Math.floor((Date.now()-new Date(c.startDate+'T12:00:00').getTime())/(1000*60*60*24*30))):0;
  const ltv=setup+(monthly*monthsActive);
  el.innerHTML=`<div class="rev-card">
    <div class="info-section-title">Revenue summary</div>
    <div class="rev-row"><span class="rev-label">Setup fee</span><span class="rev-val">${c.setup||'—'}</span></div>
    <div class="rev-row"><span class="rev-label">Monthly retainer</span><span class="rev-val">${c.monthly||'—'}</span></div>
    <div class="rev-row"><span class="rev-label">Start date</span><span class="rev-val">${fmtDate(c.startDate)||'—'}</span></div>
    <div class="rev-row"><span class="rev-label">Months active</span><span class="rev-val">${monthsActive||'—'}</span></div>
    <div class="rev-row" style="border-top:2px solid var(--bdr2);margin-top:4px;padding-top:10px"><span style="font-weight:700">Estimated LTV</span><span class="rev-val">$${ltv.toLocaleString()}</span></div>
  </div>`;
}

// ── INFO TAB ──────────────────────────────────────────────────────
function renderInfo(c){
  const el=document.getElementById('ilist');if(!el)return;
  el.innerHTML=`<div class="info-card">
    <div class="info-section-title">Client profile</div>
    <div class="info-row"><span class="info-key">Business</span><span class="info-val">${esc(c.name||'—')}</span></div>
    <div class="info-row"><span class="info-key">Owner</span><span class="info-val">${esc(c.owner||'—')}</span></div>
    <div class="info-row"><span class="info-key">Email</span><span class="info-val">${esc(c.email||'—')}</span></div>
    <div class="info-row"><span class="info-key">Phone</span><span class="info-val">${esc(c.phone||'—')}</span></div>
    <div class="info-row"><span class="info-key">Business type</span><span class="info-val">${esc(c.type||'—')}</span></div>
    <div class="info-row"><span class="info-key">Source</span><span class="info-val">${esc(c.source||'—')}</span></div>
    <div class="info-row"><span class="info-key">Tier</span><span class="info-val">${tierLabel(c.tier)}</span></div>
    <div class="info-row"><span class="info-key">Status</span><span class="info-val">${statusLabel(c.status||'prospect')}</span></div>
    <div class="info-row"><span class="info-key">Setup fee</span><span class="info-val">${esc(c.setup||'—')}</span></div>
    <div class="info-row"><span class="info-key">Monthly</span><span class="info-val">${esc(c.monthly||'—')}</span></div>
    <div class="info-row"><span class="info-key">Start date</span><span class="info-val">${fmtDate(c.startDate)||'—'}</span></div>
    <div class="info-row"><span class="info-key">Target launch</span><span class="info-val">${fmtDate(c.launchDate)||'—'}</span></div>
  </div>`;
}

// ── MODAL: ADD / EDIT CLIENT ───────────────────────────────────────
function openNew(){
  document.getElementById('mtitle').textContent='New client';
  document.getElementById('mprimary-btn').textContent='Add client';
  document.getElementById('edit-id').value='';
  ['fn','fo','fp','fe','ft','fsource','fsu','fmo','fstart','flaunch'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ftr').value='tier1';
  document.getElementById('fstatus').value='prospect';
  document.getElementById('delete-row').innerHTML='';
  document.getElementById('overlay').classList.add('open');
}
function openEditProfile(){
  const c=clients.find(x=>x.id===cid);if(!c)return;
  document.getElementById('mtitle').textContent='Edit client info';
  document.getElementById('mprimary-btn').textContent='Save changes';
  document.getElementById('edit-id').value=c.id;
  document.getElementById('fn').value=c.name||'';
  document.getElementById('fo').value=c.owner||'';
  document.getElementById('fp').value=c.phone||'';
  document.getElementById('fe').value=c.email||'';
  document.getElementById('ft').value=c.type||'';
  document.getElementById('fsource').value=c.source||'';
  document.getElementById('ftr').value=c.tier||'tier1';
  document.getElementById('fstatus').value=c.status||'prospect';
  document.getElementById('fsu').value=c.setup||'';
  document.getElementById('fmo').value=c.monthly||'';
  document.getElementById('fstart').value=c.startDate||'';
  document.getElementById('flaunch').value=c.launchDate||'';
  document.getElementById('delete-row').innerHTML=`<button class="btn-danger" onclick="deleteClient('${c.id}')">🗑 Delete this client</button>`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function outsideClose(e){if(e.target&&e.target.id==='overlay')closeModal();}

function saveClient(){
  const name=document.getElementById('fn').value.trim();
  const owner=document.getElementById('fo').value.trim();
  if(!name||!owner){alert('Business name and Owner name are required.');return;}
  const editId=document.getElementById('edit-id').value;
  if(editId){
    const c=clients.find(x=>x.id===editId);
    if(c){
      c.name=name;c.owner=owner;
      c.phone=document.getElementById('fp').value;
      c.email=document.getElementById('fe').value;
      c.type=document.getElementById('ft').value;
      c.source=document.getElementById('fsource').value;
      c.tier=document.getElementById('ftr').value;
      c.status=document.getElementById('fstatus').value;
      c.setup=document.getElementById('fsu').value;
      c.monthly=document.getElementById('fmo').value;
      c.startDate=document.getElementById('fstart').value;
      c.launchDate=document.getElementById('flaunch').value;
    }
  } else {
    clients.push({
      id:uid(),name,owner,
      phone:document.getElementById('fp').value,
      email:document.getElementById('fe').value,
      type:document.getElementById('ft').value,
      source:document.getElementById('fsource').value,
      tier:document.getElementById('ftr').value,
      status:document.getElementById('fstatus').value,
      setup:document.getElementById('fsu').value,
      monthly:document.getElementById('fmo').value,
      startDate:document.getElementById('fstart').value,
      launchDate:document.getElementById('flaunch').value,
      tasks:{},timeline:[],notes:''
    });
  }
  closeModal();renderList();
  if(cid){
    const c=clients.find(x=>x.id===cid);
    if(c){
      document.getElementById('dn').textContent=c.name;
      document.getElementById('dm').textContent=[c.owner,c.type,c.phone].filter(Boolean).join(' · ');
      updateHeroBadges(c);renderPhases(c);renderInfo(c);renderRevenue(c);renderCountdown(c);
    }
  }
  save();
}

function deleteClient(id){
  if(!confirm('Delete this client? This cannot be undone.'))return;
  clients=clients.filter(x=>x.id!==id);
  closeModal();
  goBack();
  save();
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
